<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC 26 - Cyber Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #ff00c1;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated Background Shapes */
        .orb {
            position: fixed;
            width: 400px; height: 400px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* Glass Container */
        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h1, h2 { font-family: 'Orbitron', sans-serif; text-align: center; color: var(--primary); margin-bottom: 20px; }

        /* Form Styles */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 1px; color: #aaa; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,254,0.2); }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }

        /* Dashboard (Hidden by default) */
        #dashboard { display: none; }

        /* Countdown */
        #timer {
            font-size: 2rem;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--primary);
        }

        .user-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
        }

        #pfp { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); margin: 0 auto 10px; display: block; object-fit: cover; }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="container" id="loginBox">
        <h2>ACCESS PORTAL</h2>
        <div class="form-group">
            <label>NICKNAME</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>LIFE GOAL / AIM</label>
            <textarea id="userGoal" rows="3" placeholder="What is your mission?"></textarea>
        </div>
        <div class="form-group">
            <label>PROFILE PICTURE</label>
            <input type="file" id="userPic" accept="image/*">
        </div>
        <button class="btn" onclick="enterDashboard()">INITIALIZE SYSTEM</button>
    </div>

    <div class="container" id="dashboard">
        <div class="user-card">
            <img id="pfp" src="" alt="">
            <h3 id="displayTitle" style="text-align: center;"></h3>
            <p id="displayGoal" style="text-align: center; font-style: italic; font-size: 0.9rem; color: #ccc;"></p>
        </div>

        <h2>SSC 2026 COUNTDOWN</h2>
        <div id="timer">00d 00h 00m 00s</div>

        <div class="form-group">
            <label>STUDY PROGRESS</label>
            <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 5px;">
                <input type="checkbox"> Solve Test Papers
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;">
                <input type="checkbox"> Complete Syllabus
            </div>
        </div>
    </div>

    <div class="watermark">MADE BY AMIR HAMZA 🛡️</div>

    <script>
        function enterDashboard() {
            const name = document.getElementById('userName').value;
            const goal = document.getElementById('userGoal').value;
            const picInput = document.getElementById('userPic');

            if(name === "" || goal === "") {
                alert("Oi! Name and Life Goal are must! 🛑");
                return;
            }

            // UI Switch
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Data Fill
            document.getElementById('displayTitle').innerText = "AGENT: " + name.toUpperCase();
            document.getElementById('displayGoal').innerText = '"' + goal + '"';

            // Handle Profile Pic
            if (picInput.files && picInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('pfp').src = e.target.result;
                }
                reader.readAsDataURL(picInput.files[0]);
            }
        }

        // Countdown Logic (SSC April 21, 2026)
        const examDate = new Date("April 21, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const gap = examDate - now;

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);
    </script>
</body>
</html>
